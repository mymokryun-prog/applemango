<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>애망 시그널 - 오프라인</title>
    <style>
      body { margin:0; font-family:Arial, sans-serif; background:#fff8eb; color:#2d2d2d; display:flex; align-items:center; justify-content:center; min-height:100vh; }
      .card { max-width: 500px; padding: 24px; border: 2px solid #f97316; border-radius: 24px; background:white; box-shadow: 0 12px 40px rgba(0,0,0,0.08); }
      h1 { margin:0 0 12px; color:#dc2626; }
      p { line-height:1.6; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>오프라인 모드</h1>
      <p>애망 시그널이 네트워크 연결 없이도 기본 화면을 계속 실행 중입니다. 연결이 복원되면 최신 위치와 메시지가 자동으로 갱신됩니다.</p>
      <p>이 페이지는 캐시된 앱 셸로 제공되었습니다.</p>
    </div>
  </body>
</html>
