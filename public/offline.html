<!DOCTYPE html>
<html lang="ko">
  <head>

    <title>애플망고톡 - 오프라인</title>
    <style>
      body { margin:0; font-family:Arial, sans-serif; background:#fff8eb; color:#2d2d2d; display:flex; align-items:center; justify-content:center; min-height:100vh; }

      p { line-height:1.6; }
    </style>
  </head>
  <body>
    <div class="card">
      <div style="font-size:48px;margin-bottom:12px">🍎🥭</div>
      <h1>오프라인 모드</h1>
      <p>애플망고톡이 네트워크 연결 없이도 기본 화면을 계속 실행 중입니다.<br/>연결이 복원되면 최신 위치와 메시지가 자동으로 갱신됩니다.</p>
    </div>
  </body>
</html>
